<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
</head>

<body>
    <div class="main">
        <img src="facebook.svg" alt="Facebook logo">
        <p>Facebook helps you connect and share with the people in your life.</p>
        <div class="container">
            <form id="loginForm">
                <input id="email" type="email" placeholder="Email Address or Phone number">
                <input id="password" type="password" placeholder="Password">
            </form>
            <div class="loginbutton">

                <button id="loginBtn">Login in</button>
            </div>
            <br>
            <div id="fp">
                <a class="forget" href="forgetting passward">Forgotten passward?</a>
            </div>
            <br>
            <br>
            <hr>
            <div class="createbutton">
                <button id="signupBtn">Create New Account</button>
            </div>
        </div>

        <p class="p2"><b>Create a Page</b>for a celebrity, brand or business.</p>
    </div>
    

  <p id="message" style="text-align: center; color: red;"></p>















<script src="app.js"></script>


</body>

</html>
